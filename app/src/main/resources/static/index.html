<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Clinic Management System</title>
    <link rel="icon" type="image/png" href="./assets/images/logo/Logo.png">
    <link rel="stylesheet" href="./assets/css/index.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <script src="./js/util.js" defer></script>
    <script src="./js/render.js" defer></script>
    <script src="./js/components/header.js" defer></script>
    <script src="./js/components/footer.js" defer></script>
</head>
<body>
    <main>
        <div class="container">
            <div class="wrapper">
                <div id="header"></div>
                <main class="main-content">
                    <h2>Select your role</h2>
                    <button id="btn-admin" onclick=selectRole('Admin')>Admin</button>
                    <button id="btn-doctor" onclick=selectRole('Doctor')>Doctor</button>
                    <button id="btn-patient" onclick=selectRole('Patient')>Patient</button>
                    <div id="modal" class="modal">
                        <button id="closeModal">&times;</button>
                        <div id="modal-body">
                    </div>
                </main>
                <div id="footer"></div>
            </div>
        </div>
    </main>
    <script type="module" src="../js/services/index.js" defer></script>
</body>
</html>
